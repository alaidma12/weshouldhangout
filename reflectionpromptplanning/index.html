<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reflection Prompt</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    font-family: 'Outfit', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 16px;
  }

  .reflection-block {
    background: #A8C4A2;
    border-radius: 12px;
    padding: 28px 32px;
    max-width: 680px;
    width: 100%;
  }

  .block-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #2d4a2d;
    margin-bottom: 12px;
  }

  .question {
    font-family: Georgia, serif;
    font-size: 18px;
    font-weight: 700;
    color: #1E2B1E;
    line-height: 1.4;
    margin-bottom: 16px;
  }

  .textarea-wrap {
    position: relative;
  }

  textarea {
    width: 100%;
    background: #F7FAF6;
    border: 1.5px solid rgba(90, 122, 84, 0.3);
    border-radius: 8px;
    padding: 14px 16px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    color: #1E2B1E;
    resize: none;
    height: 90px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.6;
  }

  textarea:focus {
    border-color: #5A7A54;
  }

  textarea::placeholder {
    color: #8aaa84;
    font-style: italic;
  }

  .footer-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
  }

  .note {
    font-size: 11px;
    color: #3a5a3a;
    font-style: italic;
  }

  .done-btn {
    background: #5A7A54;
    color: white;
    border: none;
    border-radius: 20px;
    padding: 7px 18px;
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, opacity 0.2s;
    opacity: 0;
    pointer-events: none;
  }

  .done-btn.visible {
    opacity: 1;
    pointer-events: all;
  }

  .done-btn:hover {
    background: #4a6a44;
  }

  /* Confirmation state */
  .confirm-row {
    display: none;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-top: 14px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.5);
    border-radius: 8px;
  }

  .confirm-row.show {
    display: flex;
  }

  .confirm-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .confirm-icon {
    font-size: 16px;
    flex-shrink: 0;
  }

  .confirm-text {
    font-size: 13px;
    color: #1E2B1E;
    font-style: italic;
    line-height: 1.4;
  }

  .copy-btn {
    background: transparent;
    border: 1.5px solid #5A7A54;
    border-radius: 20px;
    padding: 5px 14px;
    font-family: 'Outfit', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: #5A7A54;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .copy-btn:hover {
    background: #5A7A54;
    color: white;
  }

  .copy-btn.copied {
    background: #5A7A54;
    color: white;
    border-color: #5A7A54;
  }
</style>
</head>
<body>

<div class="reflection-block">
  <div class="block-label">Before you scroll</div>
  <div class="question">Which one of these do you recognize in yourself — and where does it show up most?</div>

  <div class="textarea-wrap">
    <textarea
      id="reflectionInput"
      placeholder="No right answer. Just notice."
      oninput="handleInput()"
    ></textarea>
  </div>

  <div class="footer-row">
    <span class="note" id="footerNote">Your response stays here. This is just for you.</span>
    <button class="done-btn" id="doneBtn" onclick="handleDone()">Done</button>
  </div>

  <div class="confirm-row" id="confirmMsg">
    <div class="confirm-left">
      <span class="confirm-icon">✓</span>
      <span class="confirm-text">Noted. Keep that in mind as you move through the rest of the course.</span>
    </div>
    <button class="copy-btn" id="copyBtn" onclick="handleCopy()">Copy my response</button>
  </div>
</div>

<script>
  function handleInput() {
    const input = document.getElementById('reflectionInput');
    const btn = document.getElementById('doneBtn');
    if (input.value.trim().length > 0) {
      btn.classList.add('visible');
    } else {
      btn.classList.remove('visible');
    }
  }

  function handleDone() {
    const input = document.getElementById('reflectionInput');
    const btn = document.getElementById('doneBtn');
    const confirm = document.getElementById('confirmMsg');
    const note = document.getElementById('footerNote');

    input.disabled = true;
    input.style.opacity = '0.6';
    btn.classList.remove('visible');
    note.style.display = 'none';
    confirm.classList.add('show');
  }

  function handleCopy() {
    const input = document.getElementById('reflectionInput');
    const copyBtn = document.getElementById('copyBtn');
    navigator.clipboard.writeText(input.value).then(() => {
      copyBtn.textContent = 'Copied ✓';
      copyBtn.classList.add('copied');
      setTimeout(() => {
        copyBtn.textContent = 'Copy my response';
        copyBtn.classList.remove('copied');
      }, 2000);
    }).catch(() => {
      // Fallback for environments where clipboard API isn't available
      const range = document.createRange();
      range.selectNode(input);
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(range);
      document.execCommand('copy');
      window.getSelection().removeAllRanges();
      copyBtn.textContent = 'Copied ✓';
      copyBtn.classList.add('copied');
      setTimeout(() => {
        copyBtn.textContent = 'Copy my response';
        copyBtn.classList.remove('copied');
      }, 2000);
    });
  }
</script>

</body>
</html>
